name: Build Manzil One Android APK

on:
  push:
    branches: ["claude/manzilone-mobile-app-yjajl7", "main"]
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: mobile

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies
        run: npm install

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Stage APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist/ManzilOne-v1.0.${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManzilOne-APK
          path: mobile/dist/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v1.0.${{ github.run_number }}
          name: Manzil One Android v1.0.${{ github.run_number }}
          body: |
            📱 **Manzil One — Android (debug build)**

            Installable APK built from `${{ github.sha }}` (branch `${{ github.ref_name }}`).

            **Install:** download the `.apk` below → on your phone enable
            *Install unknown apps* for your browser/file-manager → open & install.

            > Debug-signed build for testing/sideloading. Before it can load your
            > CRM, set your deployed URL in `mobile/www/app.config.js` and rebuild.
          files: mobile/dist/*.apk
          make_latest: true
          target_commitish: ${{ github.sha }}
