name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Stage APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist/ManzilOne-v1.0.${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManzilOne-APK
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release with APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Manzil One Android v1.0.${{ github.run_number }}
          body: |
            📱 **Manzil One — Android (debug build)**

            Installable APK built from commit ${{ github.sha }}.

            1. Download `ManzilOne-v1.0.${{ github.run_number }}.apk` below.
            2. On your phone enable **Install unknown apps** for your browser/file manager.
            3. Open the APK and install.

            > This is a debug-signed build for distribution/testing. For Play Store
            > you'll produce a release-signed AAB (see README).
          files: dist/*.apk
          make_latest: true
