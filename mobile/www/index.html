<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0f1a" />
    <title>Manzil One</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Fluid animated aurora / gradient-mesh background (matches the web app) -->
    <div class="aurora" aria-hidden="true">
      <span class="blob blob--1"></span>
      <span class="blob blob--2"></span>
      <span class="blob blob--3"></span>
      <span class="grain"></span>
    </div>

    <main class="stage">
      <!-- Glassmorphic launch card -->
      <section class="glass-card" role="status" aria-live="polite">
        <div class="mark">
          <svg viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#7c5cff" />
                <stop offset=".5" stop-color="#3b82f6" />
                <stop offset="1" stop-color="#22d3ee" />
              </linearGradient>
            </defs>
            <path
              d="M12 50V18l20 14 20-14v32"
              fill="none"
              stroke="url(#g)"
              stroke-width="6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="mark__ring"></span>
        </div>

        <h1 class="brand">Manzil One</h1>
        <p class="tagline">لیڈ سے کامیابی کی منزل تک</p>

        <div class="loader" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <p class="status" id="status">Preparing your workspace…</p>
      </section>

      <footer class="byline">Premium revenue platform</footer>
    </main>

    <!-- Offline fallback -->
    <div class="offline" id="offline" hidden>
      <div class="glass-card glass-card--sm">
        <h2>You're offline</h2>
        <p>Manzil One needs a connection to reach your workspace.</p>
        <button id="retry" class="btn">Try again</button>
      </div>
    </div>

    <script src="app.config.js"></script>
    <script src="boot.js"></script>
  </body>
</html>
